<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — The Ink</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="masthead">
  <div class="masthead-date" id="masthead-date"></div>
  <div class="masthead-title" style="font-size:clamp(1.8rem,4vw,3rem);padding:10px 0 6px;">
    <a href="index.html" style="color:inherit;text-decoration:none;">The <span>Ink</span></a>
  </div>
  <div class="masthead-rule">
    <nav class="masthead-nav">
      <a href="index.html">← Home</a>
      <a href="admin.html" class="active">Admin Panel</a>
    </nav>
    <div class="auth-section" id="auth-section"></div>
  </div>
</header>

<div id="access-denied" style="display:none;" class="page-wrapper">
  <div class="empty-state" style="padding:100px 20px;text-align:center;">
    <h3>Access Denied</h3>
    <p style="margin-top:10px;color:var(--ink-muted);">This page is only accessible to the super admin.</p>
    <a href="index.html" style="display:inline-block;margin-top:20px;font-family:'DM Sans',sans-serif;font-size:0.75rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);text-decoration:none;border-bottom:1px solid var(--accent);">Go Home →</a>
  </div>
</div>

<div id="loading-state" style="padding:80px;text-align:center;font-family:'DM Sans',sans-serif;font-size:0.8rem;letter-spacing:0.1em;color:var(--ink-muted);">Verifying access…</div>

<div id="admin-panel" style="display:none;">
  <div class="admin-wrapper">
    <div class="admin-title"><span>✦</span> Publish New Article</div>

    <div style="background:var(--white);border:1px solid var(--rule);padding:36px;">
      <div class="form-group">
        <label class="form-label">Article Title *</label>
        <input type="text" class="form-input" id="art-title" placeholder="Enter a compelling title…" />
      </div>
      <div class="form-group">
        <label class="form-label">Short Excerpt (shown on cards)</label>
        <input type="text" class="form-input" id="art-excerpt" placeholder="A one-line summary of the article…" />
      </div>
      <div class="form-group">
        <label class="form-label">Category / Tag</label>
        <select class="form-input" id="art-tag">
          <option value="Essay">Essay</option>
          <option value="Technology">Technology</option>
          <option value="Business">Business</option>
          <option value="Story">Story</option>
          <option value="Opinion">Opinion</option>
          <option value="Tutorial">Tutorial</option>
          <option value="Interview">Interview</option>
          <option value="News">News</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Cover Image</label>
        <input type="file" class="form-input" id="art-cover" accept="image/*" style="padding:8px;" />
        <img id="cover-preview" class="image-preview" />
      </div>
      <div class="form-group">
        <label class="form-label">Article Body *</label>
        <p style="font-family:'DM Sans',sans-serif;font-size:0.7rem;color:var(--ink-muted);margin-bottom:8px;">
          Use double line breaks for paragraphs. <code>## </code> for headings. <code>&gt; </code> for blockquotes.
        </p>
        <textarea class="form-textarea" id="art-body" placeholder="Write your article here…&#10;&#10;Use double line breaks to separate paragraphs.&#10;&#10;## This becomes a heading&#10;&#10;&gt; This becomes a blockquote"></textarea>
      </div>
      <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
        <button class="btn-publish" id="publish-btn">Publish Article</button>
        <button class="btn-publish" id="clear-btn" style="background:transparent;color:var(--ink-muted);border:1px solid var(--rule);">Clear</button>
        <span id="publish-status" style="font-family:'DM Sans',sans-serif;font-size:0.8rem;color:var(--ink-muted);"></span>
      </div>
    </div>

    <div style="margin-top:48px;">
      <div class="section-label"><span>Published Articles</span></div>
      <div id="published-list"><div class="loading-spinner">Loading…</div></div>
    </div>

    <div style="margin-top:48px;">
      <div class="section-label"><span>Subscribers</span></div>
      <div id="subscribers-list"><div class="loading-spinner">Loading…</div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    getFirestore, collection, addDoc, getDocs,
    query, orderBy, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import {
    getStorage, ref, uploadBytes, getDownloadURL
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

  const SUPER_ADMIN = "vjysupermacy@gmail.com";

  const app = initializeApp({
    apiKey: "AIzaSyBJuLSVj8RGQCuqdQno6_HqBK72KurzERE",
    authDomain: "newsletter-643db.firebaseapp.com",
    projectId: "newsletter-643db",
    storageBucket: "newsletter-643db.firebasestorage.app",
    messagingSenderId: "947442503465",
    appId: "1:947442503465:web:7e5c13295883533ace7138"
  });

  const auth = getAuth(app);
  const db = getFirestore(app);
  const storage = getStorage(app);

  document.getElementById('masthead-date').textContent =
    new Date().toLocaleDateString('en-IN', { weekday:'long', day:'numeric', month:'long', year:'numeric' }).toUpperCase();

  function showToast(msg, type='') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast show ' + type;
    setTimeout(() => t.className = 'toast', 3500);
  }

  // Cover image preview
  document.getElementById('art-cover').addEventListener('change', function() {
    const preview = document.getElementById('cover-preview');
    if (this.files && this.files[0]) {
      preview.style.display = 'block';
      preview.src = URL.createObjectURL(this.files[0]);
    }
  });

  // Clear form
  document.getElementById('clear-btn').addEventListener('click', () => {
    ['art-title','art-excerpt','art-body'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('art-tag').selectedIndex = 0;
    document.getElementById('art-cover').value = '';
    document.getElementById('cover-preview').style.display = 'none';
  });

  // Publish
  document.getElementById('publish-btn').addEventListener('click', async () => {
    const title = document.getElementById('art-title').value.trim();
    const excerpt = document.getElementById('art-excerpt').value.trim();
    const body = document.getElementById('art-body').value.trim();
    const tag = document.getElementById('art-tag').value;
    const coverFile = document.getElementById('art-cover').files[0] || null;

    if (!title || !body) { showToast('Title and body are required.', 'error'); return; }

    const btn = document.getElementById('publish-btn');
    const status = document.getElementById('publish-status');
    btn.disabled = true; btn.textContent = 'Publishing…';

    try {
      let coverURL = '';
      if (coverFile) {
        status.textContent = 'Uploading cover image…';
        const storageRef = ref(storage, `covers/${Date.now()}_${coverFile.name}`);
        await uploadBytes(storageRef, coverFile);
        coverURL = await getDownloadURL(storageRef);
      }
      status.textContent = 'Saving article…';
      await addDoc(collection(db, "articles"), {
        title, excerpt, body, tag, coverURL,
        createdAt: serverTimestamp(),
        author: "Vijey Prasanna"
      });
      showToast('Article published successfully!', 'success');
      document.getElementById('clear-btn').click();
      loadPublished();
    } catch(e) {
      showToast('Error: ' + e.message, 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'Publish Article'; status.textContent = '';
    }
  });

  // Auth state
  onAuthStateChanged(auth, user => {
    document.getElementById('loading-state').style.display = 'none';
    const section = document.getElementById('auth-section');

    if (!user) {
      section.innerHTML = `<button class="btn-auth primary" id="btn-admin-login">Sign In as Admin</button>`;
      document.getElementById('btn-admin-login').addEventListener('click', async () => {
        try { await signInWithPopup(auth, new GoogleAuthProvider()); }
        catch(e) { showToast('Login failed', 'error'); }
      });
      document.getElementById('access-denied').style.display = 'block';
      document.getElementById('admin-panel').style.display = 'none';
      return;
    }

    section.innerHTML = `
      ${user.photoURL ? `<img src="${user.photoURL}" class="user-avatar" />` : ''}
      <span style="font-family:'DM Sans',sans-serif;font-size:0.72rem;color:#9A8E7E;">${user.email}</span>
      <button class="btn-auth" id="btn-signout">Sign Out</button>`;
    document.getElementById('btn-signout').addEventListener('click', async () => { await signOut(auth); });

    if (user.email !== SUPER_ADMIN) {
      document.getElementById('access-denied').style.display = 'block';
      document.getElementById('admin-panel').style.display = 'none';
    } else {
      document.getElementById('access-denied').style.display = 'none';
      document.getElementById('admin-panel').style.display = 'block';
      loadPublished();
      loadSubscribers();
    }
  });

  function formatDate(ts) {
    if (!ts) return '—';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString('en-IN');
  }

  async function loadPublished() {
    const snap = await getDocs(query(collection(db,"articles"), orderBy("createdAt","desc")));
    const articles = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    const list = document.getElementById('published-list');
    if (!articles.length) { list.innerHTML = '<p style="color:var(--ink-muted);font-style:italic;">No articles yet.</p>'; return; }
    list.innerHTML = `<table style="width:100%;border-collapse:collapse;font-family:'DM Sans',sans-serif;font-size:0.82rem;">
      <thead><tr style="border-bottom:2px solid var(--ink);">
        <th style="text-align:left;padding:8px 12px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-muted);">Title</th>
        <th style="text-align:left;padding:8px 12px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-muted);">Tag</th>
        <th style="text-align:left;padding:8px 12px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-muted);">Date</th>
        <th style="text-align:left;padding:8px 12px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-muted);">Link</th>
      </tr></thead>
      <tbody>
        ${articles.map(a => `<tr style="border-bottom:1px solid var(--rule);">
          <td style="padding:10px 12px;color:var(--ink);font-weight:500;">${a.title}</td>
          <td style="padding:10px 12px;color:var(--ink-muted);">${a.tag || '—'}</td>
          <td style="padding:10px 12px;color:var(--ink-muted);">${formatDate(a.createdAt)}</td>
          <td style="padding:10px 12px;"><a href="article.html?id=${a.id}" target="_blank" style="color:var(--accent);text-decoration:none;border-bottom:1px solid var(--accent);">View →</a></td>
        </tr>`).join('')}
      </tbody>
    </table>`;
  }

  async function loadSubscribers() {
    try {
      const snap = await getDocs(query(collection(db,"subscribers"), orderBy("subscribedAt","desc")));
      const list = document.getElementById('subscribers-list');
      if (snap.empty) { list.innerHTML = '<p style="color:var(--ink-muted);font-style:italic;">No subscribers yet.</p>'; return; }
      const subs = snap.docs.map(d => d.data());
      list.innerHTML = `
        <p style="font-family:'DM Sans',sans-serif;font-size:0.8rem;color:var(--ink-muted);margin-bottom:12px;">${subs.length} subscriber${subs.length!==1?'s':''}</p>
        <table style="width:100%;border-collapse:collapse;font-family:'DM Sans',sans-serif;font-size:0.82rem;">
          <thead><tr style="border-bottom:2px solid var(--ink);">
            <th style="text-align:left;padding:8px 12px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-muted);">Email</th>
            <th style="text-align:left;padding:8px 12px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-muted);">Subscribed On</th>
          </tr></thead>
          <tbody>
            ${subs.map(s => `<tr style="border-bottom:1px solid var(--rule);">
              <td style="padding:10px 12px;">${s.email}</td>
              <td style="padding:10px 12px;color:var(--ink-muted);">${formatDate(s.subscribedAt)}</td>
            </tr>`).join('')}
          </tbody>
        </table>`;
    } catch(e) {
      document.getElementById('subscribers-list').innerHTML = '<p style="color:var(--ink-muted);">Could not load subscribers. Check Firestore rules.</p>';
    }
  }
</script>
</body>
</html>
